<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi perfil — Lana &amp; Lino</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<main class="page-container">
    <div class="page-header">
        <h1>Mi perfil</h1>
    </div>

    <div id="not-logged" style="display:none" class="empty-state">
        <div class="empty-icon">🔒</div>
        <h3>Debés iniciar sesión</h3>
        <a href="login.html" class="btn btn-primary mt-3">Iniciar sesión</a>
    </div>

    <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div><p>Cargando datos...</p>
    </div>

    <div class="profile-card" id="profile-card" style="display:none">
        <h2>Mis datos</h2>

        <div id="msg" class="msg"></div>

        <form id="profile-form" onsubmit="saveProfile(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="form-group">
                    <label>Apellido</label>
                    <input type="text" id="apellido" required>
                </div>
            </div>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" id="direccion">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="telefono">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Nueva contraseña <span class="text-muted" style="text-transform:none;font-weight:400">(dejar vacío para no cambiar)</span></label>
                <input type="password" id="password" placeholder="••••••••" minlength="6">
            </div>

            <div style="display:flex; gap:12px; margin-top:8px">
                <button type="submit" class="btn btn-primary" id="btn-save">Guardar cambios</button>
                <button type="button" class="btn btn-secondary" onclick="loadUserData()">Cancelar</button>
            </div>
        </form>

        <hr class="divider">
        <div style="display:flex; gap:12px; flex-wrap:wrap">
            <a href="carrito.html" class="btn btn-secondary">Mi carrito</a>
            <a href="favoritos.html" class="btn btn-secondary">Mis favoritos</a>
            <button class="btn btn-danger" onclick="handleLogout()">Cerrar sesión</button>
        </div>
    </div>
</main>

<script src="../js/configuracion.js"></script>
<script src="../js/autenticacion.js"></script>
<script src="../js/api.js"></script>
<script src="../js/encabezado.js"></script>
<script>
    let currentUser = null;

    async function init() {
        await buildHeader();
        buildFooter();

        if (!Auth.isLoggedIn()) {
            document.getElementById('not-logged').style.display = 'block';
            return;
        }

        document.getElementById('loading').style.display = 'block';
        await loadUserData();
    }

    async function loadUserData() {
        document.getElementById('profile-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            const sessionUser = Auth.getUser();
            const data        = await API.getUser(sessionUser.id_usuario);

            if (data.codigo === 200 && data.payload.length) {
                currentUser = data.payload[0];
                fillForm(currentUser);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('profile-card').style.display = 'block';
            }
        } catch {
            document.getElementById('loading').innerHTML = '<p class="text-muted">Error al cargar datos.</p>';
        }
    }

    function fillForm(user) {
        document.getElementById('nombre').value    = user.nombre    || '';
        document.getElementById('apellido').value  = user.apellido  || '';
        document.getElementById('direccion').value = user.direccion || '';
        document.getElementById('telefono').value  = user.telefono  || '';
        document.getElementById('email').value     = user.email     || '';
        document.getElementById('password').value  = '';
        document.getElementById('msg').className   = 'msg';
    }

    async function saveProfile(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        const newPassword = document.getElementById('password').value;
        const userData = {
            nombre:    document.getElementById('nombre').value.trim(),
            apellido:  document.getElementById('apellido').value.trim(),
            direccion: document.getElementById('direccion').value.trim(),
            telefono:  document.getElementById('telefono').value.trim(),
            email:     document.getElementById('email').value.trim(),
            password:  newPassword || currentUser.password,
            rol:       currentUser.rol
        };

        try {
            const sessionUser = Auth.getUser();
            const data        = await API.updateUser(sessionUser.id_usuario, userData);

            if (data.codigo === 200) {
                // actualizo el nombre en el localStorage tambien para que se vea bien en el header
                const updatedUser = { ...sessionUser, nombre: userData.nombre, apellido: userData.apellido };
                Auth.login(updatedUser, Auth.getToken());
                showMsg('success', '✅ Datos actualizados correctamente.');
                currentUser = { ...currentUser, ...userData };
            } else {
                showMsg('error', data.mensaje || 'Error al guardar.');
            }
        } catch {
            showMsg('error', 'Error de conexión.');
        }

        btn.disabled    = false;
        btn.textContent = 'Guardar cambios';
    }

    function showMsg(type, text) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = `msg msg-${type} show`;
        setTimeout(() => el.className = 'msg', 4000);
    }

    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse — Lana &amp; Lino</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="form-container" style="max-width:540px">
    <h2>Crear cuenta</h2>

    <div id="msg" class="msg"></div>

    <form id="reg-form" onsubmit="handleRegister(event)">
        <div class="form-row">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" required placeholder="Juan">
            </div>
            <div class="form-group">
                <label>Apellido</label>
                <input type="text" id="apellido" required placeholder="Pérez">
            </div>
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="direccion" required placeholder="Av. Corrientes 1234, CABA">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" id="telefono" required placeholder="+54 9 11 1234-5678">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="tu@email.com">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres" minlength="6">
            </div>
            <div class="form-group">
                <label>Repetir contraseña</label>
                <input type="password" id="password2" required placeholder="Repetí tu contraseña" minlength="6">
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="btn-submit">Registrarse</button>
    </form>

    <div class="form-link">
        ¿Ya tenés cuenta? <a href="login.html">Iniciá sesión</a>
    </div>
    <div class="form-link mt-2">
        <a href="../index.html">← Volver al catálogo</a>
    </div>
</div>

<script src="../js/configuracion.js"></script>
<script src="../js/autenticacion.js"></script>
<script src="../js/api.js"></script>
<script src="../js/encabezado.js"></script>
<script>
    if (Auth.isLoggedIn()) window.location.href = '../index.html';

    buildHeader();

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = 'Registrando...';

        const password  = document.getElementById('password').value;
        const password2 = document.getElementById('password2').value;

        if (password !== password2) {
            showMsg('error', 'Las contraseñas no coinciden.');
            btn.disabled = false;
            btn.textContent = 'Registrarse';
            return;
        }

        const userData = {
            nombre:    document.getElementById('nombre').value.trim(),
            apellido:  document.getElementById('apellido').value.trim(),
            direccion: document.getElementById('direccion').value.trim(),
            telefono:  document.getElementById('telefono').value.trim(),
            email:     document.getElementById('email').value.trim(),
            password,
            rol:       'usuario'
        };

        try {
            const data = await API.register(userData);

            if (data.codigo === 200) {
                showMsg('success', 'Cuenta creada correctamente. Redirigiendo al login...');
                setTimeout(() => window.location.href = 'login.html', 1800);
            } else {
                showMsg('error', data.mensaje || 'Error al registrar. Intentá nuevamente.');
                btn.disabled = false;
                btn.textContent = 'Registrarse';
            }
        } catch {
            showMsg('error', 'Error de conexión. Verificá que el backend esté activo.');
            btn.disabled = false;
            btn.textContent = 'Registrarse';
        }
    }

    function showMsg(type, text) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = `msg msg-${type} show`;
    }
</script>
</body>
</html>
